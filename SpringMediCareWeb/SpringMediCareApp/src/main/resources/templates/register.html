<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
    <head>
        <title>Đăng ký</title>
    </head>
    <body>

        <section layout:fragment="content">
            <div class="register-center-wrap">
                <div class="register-pastel-box">
                    <div class="register-head-box">
                        <span class="register-label-chip">TÀI KHOẢN BỆNH NHÂN</span>
                        <h2>Đăng ký</h2>
                        <p>Điền đầy đủ thông tin để tạo tài khoản và sử dụng các chức năng của hệ thống.</p>
                    </div>

                    <p th:if="${error}" th:text="${error}" class="register-error-text"></p>

                    <form th:action="@{/register}" method="post">
                        <div class="register-grid-2">
                            <div class="register-field-box">
                                <label>Họ</label>
                                <input type="text" name="firstName" placeholder="Nhập họ" required>
                            </div>

                            <div class="register-field-box">
                                <label>Tên</label>
                                <input type="text" name="lastName" placeholder="Nhập tên" required>
                            </div>
                        </div>

                        <div class="register-grid-2">
                            <div class="register-field-box">
                                <label>Email</label>
                                <input type="email" name="email" placeholder="Nhập email" required>
                            </div>

                            <div class="register-field-box">
                                <label>Số điện thoại</label>
                                <input type="text" name="phone" placeholder="Nhập số điện thoại" required>
                            </div>
                        </div>

                        <div class="register-grid-2">
                            <div class="register-field-box">
                                <label>Tên đăng nhập</label>
                                <input type="text" name="username" placeholder="Nhập tên đăng nhập" required>
                            </div>

                            <div class="register-field-box">
                                <label>Mật khẩu</label>
                                <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                            </div>
                        </div>

                        <div class="register-grid-2">
                            <div class="register-field-box">
                                <label>Ngày sinh</label>
                                <input type="text"
                                       name="dateOfBirth"
                                       placeholder="dd/MM/yyyy"
                                       pattern="[0-9]{2}/[0-9]{2}/[0-9]{4}"
                                       required>
                            </div>

                            <div class="register-field-box">
                                <label>Giới tính</label>
                                <select name="gender" required>
                                    <option value="">-- Chọn giới tính --</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nu">Nữ</option>
                                </select>
                            </div>
                        </div>

                        <div class="register-field-box register-field-full">
                            <label>Địa chỉ</label>
                            <input type="text" name="address" placeholder="Nhập địa chỉ" required>
                        </div>

                        <button type="submit" class="register-big-btn">Đăng ký</button>
                    </form>

                    <p class="register-login-line">
                        Đã có tài khoản?
                        <a th:href="@{/login}">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </section>

    </body>
</html>
