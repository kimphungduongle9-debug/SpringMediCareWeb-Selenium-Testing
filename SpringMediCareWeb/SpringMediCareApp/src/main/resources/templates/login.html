<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
    <head>
        <title>Đăng nhập</title>
    </head>
    <body>

        <section layout:fragment="content">
            <div class="login-center-wrap">
                <div class="login-pastel-box">
                    <div class="login-head-box">
                        <span class="login-label-chip">TÀI KHOẢN BỆNH NHÂN</span>
                        <h2>Đăng nhập</h2>
                        <p>Đăng nhập để đặt lịch khám, xem lịch sử khám và sử dụng các chức năng của hệ thống.</p>
                    </div>

                    <p th:if="${error}" th:text="${error}" class="login-error-text"></p>
                    <p th:if="${success}" th:text="${success}" class="login-success-text"></p>

                    <form th:action="@{/login}" method="post">
                        <div class="login-field-box">
                            <label>Tên đăng nhập hoặc email</label>
                            <input type="text" name="username" placeholder="Nhập tên đăng nhập hoặc email" required>
                        </div>

                        <div class="login-field-box">
                            <label>Mật khẩu</label>
                            <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                        </div>

                        <button type="submit" class="login-big-btn">Đăng nhập</button>
                    </form>

                    <p class="login-register-line">
                        Chưa có tài khoản?
                        <a th:href="@{/register}">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </section>

    </body>
</html>
